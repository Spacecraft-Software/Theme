# SPDX-License-Identifier: GPL-3.0-or-later
# Spacecraft Software Starship Theme — Powerline layout
# Adapted from the official catppuccin-powerline preset
# (https://starship.rs/presets/catppuccin-powerline) with the Spacecraft Software palette
# substituted for catppuccin_mocha.

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](red)\
$os\
$username\
[](bg:peach fg:red)\
$directory\
[](bg:yellow fg:peach)\
$git_branch\
$git_status\
[](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:green bg:sapphire)\
$conda\
[](fg:sapphire bg:lavender)\
$time\
[ ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

palette = 'spacecraft_software'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[bun]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[conda]
symbol = "  "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[  $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = " in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

# ------------------------------------------------------------------------------
# PALETTE DEFINITION — Spacecraft Software
# Catppuccin role keys are preserved (red, peach, yellow, green, sapphire,
# lavender, crust, …) so the upstream preset layout above renders unchanged,
# but every hex value resolves to a token from the Spacecraft Software canonical palette.
# ------------------------------------------------------------------------------
[palettes.spacecraft_software]
# Powerline section accents (used as block backgrounds in the format string)
red       = "#FF5C5C"  # red_oxide     — OS / username cap
peach     = "#D98E32"  # molten_amber  — directory block
yellow    = "#6272A4"  # slag_grey     — git block (neutral industrial mid-tone)
green     = "#50FA7B"  # radium_green  — language runtimes block
sapphire  = "#4B7EB0"  # steel_blue    — docker / conda block
lavender  = "#8BE9FD"  # liquid_cool   — time block

# Dark canvas — used as foreground text on the bright section blocks
crust     = "#000027"  # void_navy
mantle    = "#000027"  # void_navy
base      = "#000027"  # void_navy

# Secondary surfaces
surface0  = "#050530"  # deep_plate
surface1  = "#050530"  # deep_plate
surface2  = "#050530"  # deep_plate

# Dim / muted scale
overlay0  = "#6272A4"  # slag_grey
overlay1  = "#6272A4"  # slag_grey
overlay2  = "#6272A4"  # slag_grey

# Foreground text scale
text      = "#D98E32"  # molten_amber  — primary foreground
subtext0  = "#E6E6F0"  # chrome_white  — secondary foreground
subtext1  = "#E6E6F0"  # chrome_white

# Remaining catppuccin role keys mapped to nearest Spacecraft Software semantic
rosewater = "#FF5C5C"  # red_oxide
flamingo  = "#FF5C5C"  # red_oxide
pink      = "#FF5C5C"  # red_oxide
mauve     = "#FF5C5C"  # red_oxide
maroon    = "#FF5C5C"  # red_oxide
teal      = "#8BE9FD"  # liquid_cool
sky       = "#8BE9FD"  # liquid_cool
blue      = "#4B7EB0"  # steel_blue
